<style>
/* ===== 全局 ===== */
:root {
  --primary:   #F5A623;
  --primary-d: #D4881B;
  --success:   #4CAF50;
  --danger:    #F44336;
  --warning:   #FF9800;
  --info:      #2196F3;
  --gold:      #FFD700;
  --bg:        #FAFAF7;
  --card:      #FFFFFF;
  --text:      #333333;
  --muted:     #888888;
  --border:    #E0E0E0;
  --radius:    12px;
  --shadow:    0 2px 12px rgba(0,0,0,.08);
}

* { box-sizing: border-box; }

body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  min-height: 100vh;
}

/* ===== 導覽列 ===== */
.navbar-brand span { font-weight: 700; color: var(--primary); }
.nav-link.active   { color: var(--primary) !important; font-weight: 600; }

/* ===== 卡片 ===== */
.card {
  border: none;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.card-header {
  background: transparent;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  padding: 1rem 1.25rem;
}

/* ===== 按鈕 ===== */
.btn-gold {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: .5rem 1.2rem;
  font-weight: 600;
  transition: background .2s;
}
.btn-gold:hover { background: var(--primary-d); color: #fff; }

/* ===== 進度條 ===== */
.progress { height: 10px; border-radius: 5px; }
.progress-bar-gold { background: linear-gradient(90deg, var(--primary), var(--gold)); }

/* ===== 任務卡片（main.html）===== */
.task-card {
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: .75rem 1rem;
  cursor: pointer;
  transition: all .2s;
  user-select: none;
}
.task-card:hover        { border-color: var(--primary); background: #FFF8EE; }
.task-card.checked      { border-color: var(--success); background: #F0FBF0; }
.task-card .task-icon   { font-size: 1.6rem; }
.task-card .task-name   { font-weight: 600; font-size: .95rem; }
.task-card .task-desc   { font-size: .78rem; color: var(--muted); margin-top: 2px; }
.task-card .check-mark  { font-size: 1.4rem; color: var(--success); display: none; }
.task-card.checked .check-mark { display: block; }

/* ===== 月曆 ===== */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .8rem;
  font-weight: 600;
  cursor: default;
}
.cal-cell.gray   { background: #EEEEEE; color: #999; }
.cal-cell.red    { background: #FFCDD2; color: #B71C1C; }
.cal-cell.orange { background: #FFE0B2; color: #E65100; }
.cal-cell.green  { background: #C8E6C9; color: #1B5E20; }
.cal-cell.gold   { background: linear-gradient(135deg, #FFD700, #FFA000); color: #fff; }

/* ===== 成就牆 ===== */
.achievement-badge {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  padding: .5rem .75rem;
  border-radius: 10px;
  font-size: .75rem;
  text-align: center;
  width: 90px;
  margin: 4px;
  cursor: pointer;
  transition: transform .15s;
}
.achievement-badge:hover { transform: scale(1.05); }
.achievement-badge.unlocked { background: #FFF3E0; border: 1px solid var(--primary); }
.achievement-badge.locked   { background: #F5F5F5; border: 1px solid #DDD; opacity: .55; filter: grayscale(1); }
.achievement-badge .badge-icon { font-size: 1.6rem; }

/* ===== Toast 通知 ===== */
#toast-container {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.toast-msg {
  background: #323232;
  color: #fff;
  padding: .75rem 1.2rem;
  border-radius: 8px;
  font-size: .9rem;
  animation: slideIn .3s ease;
  max-width: 300px;
}
.toast-msg.success { background: var(--success); }
.toast-msg.danger  { background: var(--danger); }
.toast-msg.achievement {
  background: linear-gradient(135deg, #FF6F00, #FFD700);
  font-weight: 600;
}
@keyframes slideIn { from { transform: translateX(120%); opacity:0; } to { transform: translateX(0); opacity:1; } }

/* ===== 行程時間軸（schedule.html）===== */
.timeline-container {
  position: relative;
  min-height: 1080px; /* 18hr × 60px */
  border-left: 2px solid var(--border);
  margin-left: 52px;
}
.time-label {
  position: absolute;
  left: -56px;
  width: 50px;
  text-align: right;
  font-size: .72rem;
  color: var(--muted);
  transform: translateY(-50%);
}
.time-slot-line {
  position: absolute;
  left: 0;
  right: 0;
  border-top: 1px solid var(--border);
  opacity: .5;
}
.time-slot-line.hour { opacity: 1; border-color: #BDBDBD; }
.schedule-block {
  position: absolute;
  left: 4px;
  right: 4px;
  border-radius: 6px;
  padding: 3px 7px;
  font-size: .78rem;
  font-weight: 600;
  color: #fff;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,.18);
  transition: opacity .15s;
  min-height: 18px;
}
.schedule-block:hover { opacity: .88; }
.schedule-block .resize-handle {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 6px;
  cursor: s-resize;
  background: rgba(0,0,0,.15);
  border-radius: 0 0 6px 6px;
}
.tag-item {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .45rem .75rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: grab;
  font-size: .85rem;
  font-weight: 500;
  transition: background .15s;
}
.tag-item:active { cursor: grabbing; }
.tag-item:hover  { background: #F5F5F5; }
.tag-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tag-system { opacity: .75; }

/* ===== 響應式 ===== */
@media (max-width: 576px) {
  .task-card .task-desc { display: none; }
  .achievement-badge    { width: 76px; font-size: .68rem; }
}
</style>
