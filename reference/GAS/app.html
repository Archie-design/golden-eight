<script>
// ── SPA 啟動：用 localStorage token 檢查登入狀態 ───────────────
call('authGetCurrentUserPublic', _getToken()).then(function(user) {
  if (user) {
    window._currentUser = user;
    _spaActivate('main', user);
  } else {
    _setToken(''); // 清除無效 token
    _spaActivate('login', null);
  }
}).catch(function() {
  _spaActivate('login', null);
});
</script>
