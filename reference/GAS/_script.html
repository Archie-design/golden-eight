<script>
// ============================================================
// _script.html — 共用 JS 工具函式
// ============================================================

// ─── Toast 通知 ───────────────────────────────────────────────
window.showToast = function(msg, type) {
  type = type || '';
  var container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  var el = document.createElement('div');
  el.className = 'toast-msg ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(function() { el.style.opacity = '0'; el.style.transition = 'opacity .4s'; }, 2800);
  setTimeout(function() { el.remove(); }, 3200);
};

window.showAchievement = function(name) {
  showToast('🏆 解鎖成就：' + name, 'achievement');
};

// ─── Loading Overlay ──────────────────────────────────────────
window.showLoading = function(show) {
  if (show === undefined) show = true;
  var overlay = document.getElementById('loading-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'loading-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9998;display:flex;align-items:center;justify-content:center;';
    overlay.innerHTML = '<div style="background:#fff;padding:2rem 2.5rem;border-radius:12px;text-align:center;"><div class="spinner-border text-warning" role="status"></div><div style="margin-top:.75rem;font-weight:600;">處理中...</div></div>';
    document.body.appendChild(overlay);
  }
  overlay.style.display = show ? 'flex' : 'none';
};

// ─── Token Session 管理 ───────────────────────────────────────
window._getToken = function() {
  try { return localStorage.getItem('gas_token') || ''; } catch(e) { return ''; }
};
window._setToken = function(token) {
  try {
    if (token) localStorage.setItem('gas_token', token);
    else localStorage.removeItem('gas_token');
  } catch(e) {}
};

// ─── GAS 呼叫 Wrapper ─────────────────────────────────────────
window.call = function(fn) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject) {
    var runner = window.google && google.script && google.script.run;
    if (!runner) {
      console.warn('google.script.run 不可用（開發模式）');
      reject(new Error('GAS 環境未就緒'));
      return;
    }
    runner.withSuccessHandler(resolve).withFailureHandler(reject)[fn].apply(runner, args);
  });
};

// callAuth：自動在第一個參數插入 token（用於所有需要驗證的 GAS 函式）
window.callAuth = function(fn) {
  var args = Array.prototype.slice.call(arguments, 1);
  return window.call.apply(null, [fn, _getToken()].concat(args));
};

// ─── SPA 路由 ─────────────────────────────────────────────────
window._spaActivate = function(viewName, user) {
  document.querySelectorAll('.spa-view').forEach(function(v) {
    v.classList.add('d-none');
  });
  var el = document.getElementById('view-' + viewName);
  if (el) el.classList.remove('d-none');
  var initFn = window['_initView_' + viewName];
  if (typeof initFn === 'function') {
    initFn(user !== undefined ? user : window._currentUser);
  }
};

window.goto = function(page) {
  var name = (page === 'index') ? 'login' : page;
  _spaActivate(name, window._currentUser);
};

window.requireLogin = function() {
  call('authGetCurrentUserPublic').then(function(user) {
    if (!user) {
      _spaActivate('login', null);
      return;
    }
    window._currentUser = user;
    if (window.onUserLoaded) window.onUserLoaded(user);
  }).catch(function(err) {
    console.error('requireLogin 失敗：', err);
    _spaActivate('login', null);
  });
};

// ─── 日期工具 ─────────────────────────────────────────────────
window.formatDate = function(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  var days = ['日','一','二','三','四','五','六'];
  return (d.getMonth()+1) + '/' + d.getDate() + ' (' + days[d.getDay()] + ')';
};

window.timeToMinutes = function(hhmm) {
  var parts = hhmm.split(':').map(Number);
  return parts[0] * 60 + parts[1];
};

window.minutesToTime = function(minutes) {
  var h = Math.floor(minutes / 60), m = minutes % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
};

// ─── 顏色對比（確保文字可讀）─────────────────────────────────
window.getContrastColor = function(hex) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return (r*299 + g*587 + b*114) / 1000 > 128 ? '#333333' : '#FFFFFF';
};

// ─── 進度條更新 ───────────────────────────────────────────────
window.updateProgressBar = function(barEl, pct) {
  if (!barEl) return;
  var clamped = Math.min(100, Math.max(0, pct));
  barEl.style.width = clamped + '%';
  barEl.textContent = clamped + '%';
  barEl.setAttribute('aria-valuenow', clamped);
};
</script>
