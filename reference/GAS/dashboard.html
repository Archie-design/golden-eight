<!-- 導覽列 -->
<nav class="navbar navbar-light bg-white shadow-sm">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="#"><span>🌟 黃金八套餐</span></a>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="goto('main')">打卡</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="goto('schedule')">行程</button>
      <button class="btn btn-sm btn-link text-muted" onclick="doLogout()">登出</button>
    </div>
  </div>
</nav>

<div class="container py-3" style="max-width:700px">

  <!-- 本月進度 -->
  <div class="card mb-3">
    <div class="card-header">📊 本月進度 <span id="ym-label" class="text-muted small"></span></div>
    <div class="card-body">
      <div class="row g-3 text-center mb-3">
        <div class="col-4">
          <div class="fw-bold fs-3 text-warning" id="total-score">-</div>
          <div class="small text-muted">累計得分</div>
        </div>
        <div class="col-4">
          <div class="fw-bold fs-3" id="rate-val">-</div>
          <div class="small text-muted">達成率</div>
        </div>
        <div class="col-4">
          <div class="fw-bold fs-3 text-danger" id="remaining">-</div>
          <div class="small text-muted">距目標差</div>
        </div>
      </div>
      <div class="d-flex justify-content-between small text-muted mb-1">
        <span id="level-label"></span>
        <span id="target-label"></span>
      </div>
      <div class="progress" style="height:14px">
        <div id="dash-rate-bar" class="progress-bar progress-bar-gold" role="progressbar" style="width:0%">0%</div>
      </div>
      <div id="next-level-section" class="mt-3 d-none">
        <hr>
        <div class="small mb-2 text-muted">📅 每月 25 日後可選擇下月階梯：</div>
        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-sm btn-outline-warning" onclick="setNextLevel('黃金戰士')">黃金戰士</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="setNextLevel('白銀戰士')">白銀戰士</button>
          <button class="btn btn-sm btn-outline-danger" onclick="setNextLevel('青銅戰士')">青銅戰士</button>
        </div>
        <div id="next-level-current" class="small text-muted mt-1"></div>
      </div>
    </div>
  </div>

  <!-- 月曆 -->
  <div class="card mb-3">
    <div class="card-header">📅 本月打卡月曆</div>
    <div class="card-body">
      <div class="d-flex justify-content-center gap-3 mb-2 flex-wrap small text-muted">
        <span><span style="background:#EEE;padding:2px 8px;border-radius:4px">未報</span></span>
        <span><span style="background:#FFCDD2;padding:2px 8px;border-radius:4px">0–4分</span></span>
        <span><span style="background:#FFE0B2;padding:2px 8px;border-radius:4px">5–6分</span></span>
        <span><span style="background:#C8E6C9;padding:2px 8px;border-radius:4px">7分</span></span>
        <span><span style="background:linear-gradient(135deg,#FFD700,#FFA000);padding:2px 8px;border-radius:4px;color:#fff">8+分</span></span>
      </div>
      <div class="calendar-grid" style="margin-bottom:4px">
        <div class="text-center small text-muted">日</div>
        <div class="text-center small text-muted">一</div>
        <div class="text-center small text-muted">二</div>
        <div class="text-center small text-muted">三</div>
        <div class="text-center small text-muted">四</div>
        <div class="text-center small text-muted">五</div>
        <div class="text-center small text-muted">六</div>
      </div>
      <div class="calendar-grid" id="calendar"></div>
    </div>
  </div>

  <!-- 八項任務完成率 -->
  <div class="card mb-3">
    <div class="card-header">📈 本月各項任務完成次數</div>
    <div class="card-body">
      <div id="task-bars"></div>
    </div>
  </div>

  <!-- 連續打拳 -->
  <div class="card mb-3">
    <div class="card-header">🥊 連續打拳紀錄</div>
    <div class="card-body d-flex gap-4 text-center">
      <div class="flex-grow-1">
        <div class="fs-2 fw-bold text-warning" id="streak-cur">-</div>
        <div class="small text-muted">目前連續天數</div>
      </div>
      <div class="flex-grow-1">
        <div class="fs-2 fw-bold" id="streak-max">-</div>
        <div class="small text-muted">本月最長連續</div>
      </div>
    </div>
  </div>

  <!-- 成就牆 -->
  <div class="card mb-3">
    <div class="card-header">🏆 成就牆</div>
    <div class="card-body">
      <div id="achievement-wall" class="d-flex flex-wrap justify-content-start"></div>
    </div>
  </div>

</div>

<script>
var TASK_NAMES = ['早睡早起','破曉打拳','丹氣跑步','曬太陽','工作8小時','不吃肉','寫觀心書','淨心功法'];
var TASK_ICONS = ['🌙','🥊','🏃','☀️','💼','🥗','📖','🧘'];

var ALL_ACHIEVEMENTS = [
  {code:'FIRST_CHECKIN', name:'萬里起行 🎉'}, {code:'DAILY_PERFECT', name:'大滿貫 🌟'}, {code:'DAILY_PERFECT_BONUS', name:'金色大滿貫 ⭐'},
].concat(
  ['T1','T2','T3','T4','T5','T6','T7','T8'].reduce(function(arr, t, i) {
    [[3,'初心'],[7,'習慣'],[30,'達人'],[100,'百日']].forEach(function(pair) {
      arr.push({code: t + '_STREAK_' + pair[0], name: TASK_ICONS[i] + ' ' + pair[1]});
    });
    return arr;
  }, [])
).concat([
  {code:'CHECKIN_30', name:'打卡30天 📅'}, {code:'CHECKIN_100', name:'打卡百日 📅'}, {code:'CHECKIN_365', name:'打卡一年 📅'},
  {code:'PERFECT_10', name:'大滿貫x10 🌟'}, {code:'PERFECT_30', name:'大滿貫x30 🌟'},
  {code:'MONTH_PASS', name:'初次通關 🎖️'}, {code:'MONTH_GOLD', name:'黃金通關 🥇'}, {code:'MONTH_PERFECT', name:'完美月 💯'},
  {code:'MONTH_STREAK_3', name:'三月連勝 🔥'}, {code:'MONTH_STREAK_6', name:'半年英雄 🏆'}
]);

// ─── 初始化（每次切換到此 view 時呼叫）────────────────────────
window._initView_dashboard = function(user) {
  if (user) {
    document.querySelector('#view-dashboard .navbar-brand').innerHTML = '<span>🌟 ' + user.name + '</span>';
  }
  loadDashboard();
};

function loadDashboard() {
  showLoading(true);
  callAuth('statsGetDashboard').then(function(data) {
    showLoading(false);
    if (!data.ok) { showToast(data.msg, 'danger'); return; }
    renderDashboard(data);
  }).catch(function() { showLoading(false); showToast('載入失敗', 'danger'); });
}

function renderDashboard(data) {
  document.getElementById('ym-label').textContent = data.yearMonth;
  document.getElementById('total-score').textContent = data.totalScore;
  document.getElementById('rate-val').textContent  = data.rate + '%';
  document.getElementById('remaining').textContent  = data.remaining > 0 ? '-' + data.remaining : '已達標 ✅';
  document.getElementById('level-label').textContent = data.user.level + ' 目標：' + Math.round(data.maxScore * getLevelThreshold(data.user.level) * 100) / 100 + ' 分';
  document.getElementById('target-label').textContent = '目標 ' + data.targetScore + ' 分';
  updateProgressBar(document.getElementById('dash-rate-bar'), data.rate);
  document.getElementById('streak-cur').textContent = data.punchStreak || 0;
  document.getElementById('streak-max').textContent = data.maxPunchMonth || 0;

  // 下月階梯
  if (data.showNextLevelBtn) {
    document.getElementById('next-level-section').classList.remove('d-none');
    if (data.user.nextLevel) {
      document.getElementById('next-level-current').textContent = '目前已選：' + data.user.nextLevel;
    }
  } else {
    document.getElementById('next-level-section').classList.add('d-none');
  }

  renderCalendar(data.calendar);
  renderTaskBars(data.taskCounts);
  renderAchievements(data.achievements);
}

function getLevelThreshold(level) {
  return { '黃金戰士': 0.80, '白銀戰士': 0.70, '青銅戰士': 0.60 }[level] || 0.6;
}

function renderCalendar(days) {
  if (!days || !days.length) return;
  var cal = document.getElementById('calendar');
  cal.innerHTML = '';
  var firstDay = new Date(days[0].date + 'T00:00:00+08:00').getDay();
  for (var i = 0; i < firstDay; i++) {
    cal.appendChild(document.createElement('div'));
  }
  days.forEach(function(day) {
    var cell = document.createElement('div');
    cell.className = 'cal-cell ' + day.color;
    cell.textContent = day.day;
    if (day.score !== null) cell.title = day.date + '：' + day.score + ' 分';
    cal.appendChild(cell);
  });
}

function renderTaskBars(counts) {
  var container = document.getElementById('task-bars');
  var maxCount  = Math.max.apply(null, counts.concat([1]));
  container.innerHTML = counts.map(function(c, i) {
    return '<div class="d-flex align-items-center gap-2 mb-2">' +
      '<div style="width:100px;font-size:.82rem">' + TASK_ICONS[i] + ' ' + TASK_NAMES[i] + '</div>' +
      '<div class="flex-grow-1 progress" style="height:8px">' +
        '<div class="progress-bar" style="width:' + Math.round(c/maxCount*100) + '%;background:var(--primary)"></div>' +
      '</div>' +
      '<div style="width:28px;text-align:right;font-size:.82rem">' + c + '</div>' +
    '</div>';
  }).join('');
}

function renderAchievements(unlocked) {
  var codes = {};
  (unlocked || []).forEach(function(a) { codes[a.code] = true; });
  var wall = document.getElementById('achievement-wall');
  wall.innerHTML = ALL_ACHIEVEMENTS.map(function(ach) {
    var isUnlocked = !!codes[ach.code];
    var cls = isUnlocked ? 'unlocked' : 'locked';
    var parts = ach.name.split(' ');
    var badgeChar = parts[parts.length - 1];
    var label = ach.name.replace(badgeChar, '').trim();
    return '<div class="achievement-badge ' + cls + '" title="' + ach.name + '">' +
      '<div class="badge-icon">' + badgeChar + '</div>' +
      '<div class="mt-1" style="font-size:.68rem">' + label + '</div>' +
    '</div>';
  }).join('');
}

function setNextLevel(level) {
  callAuth('authUpdateNextMonthLevel', level).then(function(res) {
    showToast(res.msg, res.ok ? 'success' : 'danger');
    if (res.ok) document.getElementById('next-level-current').textContent = '目前已選：' + level;
  });
}

function doLogout() {
  callAuth('authLogout').then(function() { _setToken(''); goto('login'); });
}
</script>
